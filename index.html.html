<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>แปลงเป็น Google Docs พร้อม Upload</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f2;min-height:100vh;padding:2rem 1rem;color:#1a1a18}
.wrap{max-width:660px;margin:0 auto}
h1{font-size:20px;font-weight:500;margin-bottom:1.5rem;color:#1a1a18;display:flex;align-items:center;gap:8px}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.section-label{font-size:12px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.dropzone{border:2px dashed rgba(0,0,0,0.15);border-radius:12px;padding:2.5rem 2rem;text-align:center;background:#fafafa;cursor:pointer;transition:all .2s}
.dropzone:hover{background:#f0f0f0;border-color:#1a1a18}
.dropzone i{font-size:36px;color:#1a1a18;margin-bottom:8px;display:block}
#file-input{display:none}
.file-list{margin-top:1rem}
.file-item{display:flex;flex-direction:column;padding:12px;border-bottom:1px solid rgba(0,0,0,0.06);font-size:14px;background:#fff;margin-bottom:6px;border-radius:6px}
.file-row{display:flex;align-items:center;justify-content:space-between}
.file-info{flex:1;display:flex;flex-direction:column;padding-right:10px}
.file-name{font-weight:500;word-break:break-all}
.file-meta{font-size:12px;color:#666;margin-top:2px}
.status-badge{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.status-wait{background:#e0e0e0;color:#333}
.status-uploading{background:#ffe0b2;color:#e65100}
.status-success{background:#c8e6c9;color:#2e7d32}
.status-error{background:#ffcdd2;color:#c62828}

/* สไตล์กล่องผลลัพธ์ลิงก์และปุ่มคัดลอก */
.link-box{margin-top:8px;padding:8px 10px;background:#f1f3f4;border-radius:6px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.gdoc-link{color:#1a73e8;text-decoration:none;font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.gdoc-link:hover{text-decoration:underline}
.btn-copy{background:#fff;border:1px solid rgba(0,0,0,0.1);color:#5f6368;cursor:pointer;padding:5px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;transition:all .2s;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
.btn-copy:hover{background:#f8f9fa;color:#1a1a18;border-color:rgba(0,0,0,0.25)}

.btn-primary{display:block;width:100%;padding:14px;background:#1a1a18;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;margin-top:1.5rem;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{background:#333}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}

/* สไตล์สำหรับซ่อน/แสดง Logs */
.btn-toggle-log{background:none;border:none;color:#1a73e8;cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px}
.btn-toggle-log:hover{text-decoration:underline}
.log-container{display:none;margin-top:8px}
#debug-log{background:#222;color:#0f0;font-family:monospace;padding:12px;border-radius:8px;max-height:180px;overflow-y:auto;font-size:12px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="wrap">
  <h1><i class="ti ti-file-text"></i> ระบบแปลงไฟล์และอัปโหลด</h1>

  <input type="hidden" id="parent-folder-id" value="1G3pzzHwTg2cbtSXhfaQI13Em89NAEySx" />

  <div class="card">
    <div class="section-label"><i class="ti ti-file-upload"></i> เลือกไฟล์ที่ต้องการดำเนินการ</div>
    <div class="dropzone" id="dropzone">
      <i class="ti ti-cloud-upload"></i>
      <p style="font-size:14px; font-weight:500;">ลากไฟล์เอกสารมาวางที่นี่ หรือคลิกเพื่อเลือกไฟล์</p>
      <p style="font-size:12px; color:#666; margin-top:4px;">รองรับการแปลงไฟล์ .docx, .doc, .txt เป็น Google Docs อัตโนมัติ</p>
      <input type="file" id="file-input" multiple />
    </div>
    
    <div class="file-list" id="file-list"></div>
    
    <button class="btn-primary" id="btn-upload" disabled>
      <i class="ti ti-file-import"></i> แปลงเป็น Google Docs พร้อม Upload
    </button>
  </div>

  <div class="card" style="background:#1e1e1e; border:none; padding:1rem 1.5rem;">
    <div class="section-label" style="color:#aaa; margin-bottom:0;">
      <span style="display:flex; align-items:center; gap:6px;"><i class="ti ti-terminal-2"></i> บันทึกการทำงาน (Logs)</span>
      <button class="btn-toggle-log" id="btn-toggle-log" onclick="toggleLog()">
        <i class="ti ti-eye"></i> แสดง Logs
      </button>
    </div>
    <div class="log-container" id="log-container">
      <div id="debug-log">ระบบพร้อมทำงาน (เซิร์ฟเวอร์หลังบ้านเวอร์ชัน 6)</div>
    </div>
  </div>
</div>

<script>
// URL ของ Google Apps Script Web App (เวอร์ชัน 6 ปัจจุบัน)
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzpn5u_OTXHaryqE_rm-PTWlG9P75351XCRzrVnpoyAGZkOVQ_jizbcO0JUQBJhIv6B/exec';

const MONTHS = ['01_มกราคม','02_กุมภาพันธ์','03_มีนาคม','04_เมษายน','05_พฤษภาคม','06_มิถุนายน','07_กรกฎาคม','08_สิงหาคม','09_กันยายน','10_ตุลาคม','11_พฤศจิกายน','12_ธันวาคม'];

let filesArray = [];
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');
const fileList = document.getElementById('file-list');
const btnUpload = document.getElementById('btn-upload');
const debugLog = document.getElementById('debug-log');
const logContainer = document.getElementById('log-container');
const btnToggleLog = document.getElementById('btn-toggle-log');

function dbg(msg) {
  const t = new Date().toLocaleTimeString();
  debugLog.innerText += `\n[${t}] ${msg}`;
  debugLog.scrollTop = debugLog.scrollHeight;
}

// ฟังก์ชันสลับการ แสดง/ซ่อน กล่องบันทึกข้อมูล (Logs)
function toggleLog() {
  if (logContainer.style.display === 'block') {
    logContainer.style.display = 'none';
    btnToggleLog.innerHTML = '<i class="ti ti-eye"></i> แสดง Logs';
  } else {
    logContainer.style.display = 'block';
    btnToggleLog.innerHTML = '<i class="ti ti-eye-off"></i> ซ่อน Logs';
  }
}

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.background = '#f0f0f0'; });
dropzone.addEventListener('dragleave', () => dropzone.style.background = '#fafafa');
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.style.background = '#fafafa';
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

function handleFiles(files) {
  for(let i=0; i<files.length; i++) {
    const f = files[i];
    const lm = f.lastModifiedDate ? new Date(f.lastModifiedDate) : new Date();
    const yearTh = lm.getFullYear() + 543;
    
    const ext = f.name.split('.').pop().toLowerCase();
    const isConvertible = ['docx', 'doc', 'txt', 'html', 'rtf'].includes(ext);

    filesArray.push({
      file: f,
      month: lm.getMonth(),
      yearTh: yearTh,
      isConvertible: isConvertible,
      status: 'wait',
      gdocUrl: '',
      id: 'f_' + Date.now() + '_' + i
    });
  }
  render();
}

function render() {
  fileList.innerHTML = '';
  if(filesArray.length === 0) {
    btnUpload.disabled = true;
    return;
  }
  
  let hasWait = false;
  filesArray.forEach(f => {
    if(f.status === 'wait') hasWait = true;
    
    const item = document.createElement('div');
    item.className = 'file-item';
    
    let statusTxt = 'รอดำเนินการ';
    let badgeClass = 'status-wait';
    if(f.status === 'uploading') { statusTxt = 'กำลังอัปโหลดและแปลงไฟล์...'; badgeClass = 'status-uploading'; }
    if(f.status === 'success') { statusTxt = 'สำเร็จ'; badgeClass = 'status-success'; }
    if(f.status === 'error') { statusTxt = 'ล้มเหลว'; badgeClass = 'status-error'; }

    const actionText = f.isConvertible ? 'แปลงเป็น Google Docs' : 'อัปโหลดปกติ';

    let htmlContent = `
      <div class="file-row">
        <div class="file-info">
          <span class="file-name">${f.file.name}</span>
          <span class="file-meta">เป้าหมายโฟลเดอร์ย่อย: เดือนที่ ${f.month + 1} (${actionText})</span>
        </div>
        <span class="status-badge ${badgeClass}">${statusTxt}</span>
      </div>
    `;

    // แสดงลิงก์เอกสารเมื่ออัปโหลดสำเร็จ พร้อมเพิ่มปุ่มคัดลอกลิงก์
    if(f.status === 'success' && f.gdocUrl) {
      htmlContent += `
        <div class="link-box">
          <a href="${f.gdocUrl}" target="_blank" class="gdoc-link">
            <i class="ti ti-external-link"></i> เปิดเอกสาร Google Docs
          </a>
          <button class="btn-copy" onclick="copyToClipboard('${f.gdocUrl}', this)" title="คัดลอกลิงก์">
            <i class="ti ti-copy"></i> คัดลอกลิงก์
          </button>
        </div>
      `;
    }

    item.innerHTML = htmlContent;
    fileList.appendChild(item);
  });
  
  btnUpload.disabled = !hasWait;
}

// ฟังก์ชันคัดลอกลิงก์และเปลี่ยนสัญลักษณ์แจ้งสถานะชั่วคราว
function copyToClipboard(text, btnElement) {
  navigator.clipboard.writeText(text).then(() => {
    btnElement.innerHTML = '<i class="ti ti-check" style="color:#2e7d32;"></i> คัดลอกแล้ว';
    setTimeout(() => {
      btnElement.innerHTML = '<i class="ti ti-copy"></i> คัดลอกลิงก์';
    }, 2000);
  }).catch(err => {
    console.error('คัดลอกผิดพลาด: ', err);
  });
}

btnUpload.addEventListener('click', async () => {
  const parentId = document.getElementById('parent-folder-id').value.trim();

  btnUpload.disabled = true;
  dbg('--- เริ่มส่งไฟล์ข้ามเซิร์ฟเวอร์ (ไม่ต้องลงชื่อเข้าใช้) ---');

  for(let i=0; i<filesArray.length; i++) {
    const f = filesArray[i];
    if(f.status !== 'wait') continue;

    f.status = 'uploading';
    render();
    dbg(`กำลังประมวลผล: "${f.file.name}"`);

    try {
      const reader = new FileReader();
      const base64Data = await new Promise((resolve, reject) => {
        reader.readAsDataURL(f.file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = e => reject(e);
      });
      
      const payload = {
        name: f.file.name,
        mimeType: f.file.type || 'application/octet-stream',
        base64: base64Data,
        parentId: parentId,
        monthName: MONTHS[f.month],
        yearTh: f.yearTh,
        isConvertible: f.isConvertible
      };

      const response = await fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });

      const resData = await response.json();

      if(resData.status === 'success') {
        f.status = 'success';
        f.gdocUrl = resData.url; 
        dbg(`สำเร็จ! สิ้นสุดการประมวลผล: ${f.file.name}`);
      } else {
        f.status = 'error';
        dbg(`ผิดพลาดจากฝั่งเซิร์ฟเวอร์: ${resData.message}`);
      }
    } catch (err) {
      f.status = 'error';
      dbg(`เกิดข้อผิดพลาดในการยิง API: ${err.message}`);
    }
    render();
  }
  dbg('--- จบการประมวลผลทั้งหมด ---');
});
</script>
</body>
</html>
